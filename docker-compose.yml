services:
  minio:
    image: minio/minio:latest
    container_name: agent_catalog_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:latest
    container_name: agent_catalog_minio_bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb -p local/warehouse &&
        echo 'Bucket created successfully'
      "
    restart: "no"

  nessie:
    image: ghcr.io/projectnessie/nessie:0.67.0
    container_name: agent_catalog_nessie
    depends_on:
      minio:
        condition: service_healthy
    environment:
      QUARKUS_HTTP_PORT: 19120
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: ""        # ← disables otel export
      QUARKUS_OTEL_SDK_DISABLED: "true"              # ← fully disables otel
    ports:
      - "19120:19120"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v1/config"]
      interval: 5s
      timeout: 5s
      retries: 10

  ddl-init:
    image: ghcr.io/rahul-tavro/agent-catalog-docker:latest
    container_name: agent_catalog_ddl_init
    depends_on:
      minio-bootstrap:
        condition: service_completed_successfully
      nessie:
        condition: service_healthy
    environment:
      ICEBERG_BUCKET: warehouse
      DDL_ROOT: /opt/ddl
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    restart: "no"

volumes:
  minio_data:
